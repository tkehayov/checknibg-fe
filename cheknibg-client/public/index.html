    <script>
      const gtmId = "GTM-MC44NS4Q";

      function loadGTM() {
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, "script", "dataLayer", gtmId);
        const noscriptIframe = document.createElement("noscript");
        noscriptIframe.innerHTML = `<iframe src="https://www.googletagmanager.com/ns.html?id=${gtmId}"
          height="0" width="0" style="display:none;visibility:hidden"></iframe>`;
        document.body.insertBefore(noscriptIframe, document.body.firstChild);

        document.removeEventListener("mousemove", loadGTM, { once: true });
        document.removeEventListener("scroll", loadGTM, { once: true });
        document.removeEventListener("touchstart", loadGTM, { once: true });
        clearTimeout(loadGTM.timeoutId);
      }

      document.addEventListener("mousemove", loadGTM, { once: true });
      document.addEventListener("scroll", loadGTM, { once: true });
      document.addEventListener("touchstart", loadGTM, { once: true });

      // Fallback: If no interaction occurs, load GTM after a timeout (1 seconds)
      loadGTM.timeoutId = setTimeout(loadGTM, 5000);
    </script>
